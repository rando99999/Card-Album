<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Passed Down — A Card Album</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#E4D5B7; --paper-deep:#D3BE92; --paper-light:#F7EFDC;
  --ink:#2B2420; --ink-soft:#6b6152;
  --purple:#552583; --gold:#c98f0d; --gold-bright:#e0a91b; --rust:#a8552e; --moss:#5c6b3f;
  --tape:rgba(226,212,178,0.9); --shadow:rgba(43,36,32,0.28);
  --font-display:'Fraunces',serif; --font-hand:'Caveat',cursive;
  --font-body:'Source Serif 4',serif; --font-mono:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{font-family:var(--font-body);color:var(--ink);
  background:radial-gradient(ellipse at 20% 0%, rgba(255,255,255,0.25), transparent 55%),
    radial-gradient(ellipse at 90% 90%, rgba(0,0,0,0.06), transparent 50%), var(--paper);
  min-height:100%;overflow-x:hidden;}
::selection{background:var(--gold-bright);color:var(--ink);}
button{font-family:inherit;cursor:pointer;}
input,textarea{font-family:inherit;}
:focus-visible{outline:3px solid var(--purple);outline-offset:2px;}

#app{max-width:1080px;margin:0 auto;padding:18px 16px 80px;}
.header{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:6px;flex-wrap:wrap;}
.title-block h1{font-family:var(--font-display);font-weight:700;font-size:clamp(30px,6vw,44px);margin:0;line-height:1;color:var(--ink);letter-spacing:-0.01em;}
.title-block .sub{font-family:var(--font-hand);font-size:20px;color:var(--ink-soft);margin-top:2px;}
.ledger-toggle{display:flex;align-items:center;gap:8px;background:var(--paper-light);border:1px solid var(--paper-deep);border-radius:999px;padding:6px 12px 6px 8px;font-family:var(--font-mono);font-size:12px;color:var(--ink-soft);box-shadow:0 1px 2px var(--shadow);}
.switch{position:relative;width:34px;height:19px;background:#c9b896;border-radius:999px;transition:background .2s;flex-shrink:0;}
.switch.on{background:var(--purple);}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:15px;height:15px;background:#fff;border-radius:50%;transition:left .2s;box-shadow:0 1px 2px rgba(0,0,0,.3);}
.switch.on::after{left:17px;}

.tabs{display:flex;gap:6px;margin:18px 0 12px;flex-wrap:wrap;}
.tab{font-family:var(--font-display);font-weight:600;font-size:14px;padding:8px 16px 7px;border-radius:8px 8px 2px 2px;border:1px solid transparent;background:transparent;color:var(--ink-soft);border-bottom:3px solid transparent;}
.tab.active{background:var(--paper-light);color:var(--ink);border-bottom:3px solid var(--purple);box-shadow:0 1px 3px var(--shadow);}
.tab .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;}
.tab[data-tab="dad"] .dot{background:var(--purple);}
.tab[data-tab="son"] .dot{background:var(--gold-bright);}

.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.pill{font-size:12.5px;font-family:var(--font-mono);padding:5px 11px;border-radius:999px;border:1px solid var(--paper-deep);background:var(--paper-light);color:var(--ink-soft);}
.pill.active{background:var(--ink);color:var(--paper-light);border-color:var(--ink);}
.search-wrap{position:relative;flex:1;min-width:160px;}
.search-wrap input{width:100%;padding:7px 12px;border-radius:999px;border:1px solid var(--paper-deep);background:var(--paper-light);font-family:var(--font-mono);font-size:12.5px;color:var(--ink);}
.search-wrap input::placeholder{color:#9c9080;}

.corkboard{background:radial-gradient(circle at 15% 20%, rgba(0,0,0,0.10) 0, transparent 3%),radial-gradient(circle at 60% 70%, rgba(0,0,0,0.10) 0, transparent 3%),radial-gradient(circle at 85% 35%, rgba(0,0,0,0.10) 0, transparent 3%),radial-gradient(circle at 35% 85%, rgba(0,0,0,0.10) 0, transparent 3%),linear-gradient(135deg,#a9764f,#8f6440 60%,#7d5636);border-radius:16px;padding:22px 16px 30px;box-shadow:inset 0 2px 14px rgba(0,0,0,0.35), 0 4px 16px var(--shadow);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:22px 16px;}
.pin-card{background:var(--paper-light);padding:8px 8px 14px;border-radius:2px;box-shadow:0 6px 14px rgba(0,0,0,.35);position:relative;transition:transform .15s ease;cursor:pointer;border:1px solid rgba(0,0,0,0.05);}
.pin-card:hover{transform:translateY(-3px) scale(1.02);}
.pin-card:active{transform:translateY(0) scale(.99);}
.pin-card::before{content:'';position:absolute;top:-9px;left:50%;transform:translateX(-50%);width:16px;height:16px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,var(--gold-bright) 45%,var(--gold) 100%);box-shadow:0 2px 3px rgba(0,0,0,.5);}
.pin-photo{width:100%;aspect-ratio:2.5/3.5;background:linear-gradient(135deg,#efe5cf,#e2d3ae);border:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.pin-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.placeholder-ph{font-family:var(--font-display);font-weight:600;font-size:26px;color:#b9a377;text-align:center;padding:8px;}
.pin-owner{position:absolute;top:6px;right:6px;width:10px;height:10px;border-radius:50%;box-shadow:0 0 0 2px var(--paper-light);}
.pin-owner.dad{background:var(--purple);}
.pin-owner.son{background:var(--gold-bright);}
.pin-lock{position:absolute;bottom:6px;right:6px;font-size:12px;background:rgba(255,255,255,.85);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;}
.pin-caption{font-family:var(--font-hand);font-size:17px;text-align:center;margin-top:8px;line-height:1.15;color:var(--ink);}
.pin-sub{font-family:var(--font-mono);font-size:9px;text-align:center;color:var(--ink-soft);margin-top:2px;text-transform:uppercase;letter-spacing:.03em;}
.empty-note{font-family:var(--font-hand);font-size:22px;color:rgba(255,255,255,.85);text-align:center;padding:40px 20px;}

.overlay{position:fixed;inset:0;background:rgba(20,15,10,.55);z-index:50;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.overlay.show{opacity:1;pointer-events:auto;}
@media(min-width:760px){.overlay{align-items:center;}}
.spread{background:var(--paper-light);width:100%;max-width:820px;max-height:94vh;max-height:94dvh;overflow-y:auto;border-radius:18px 18px 0 0;box-shadow:0 -6px 30px rgba(0,0,0,.4);transform:translateY(30px);transition:transform .25s ease;padding:0 0 24px;}
.close-fab{position:fixed;top:calc(env(safe-area-inset-top,0px) + 14px);right:14px;z-index:100;width:42px;height:42px;border-radius:50%;background:var(--ink);color:var(--paper-light);display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 3px 10px rgba(0,0,0,.45);border:none;}
@media(min-width:760px){.spread{border-radius:18px;transform:translateY(10px);}}
.overlay.show .spread{transform:translateY(0);}
.spread-top{display:flex;justify-content:flex-end;gap:8px;padding:12px 14px 0;position:sticky;top:0;background:var(--paper-light);z-index:2;}
.icon-btn{background:var(--paper);border:1px solid var(--paper-deep);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--ink-soft);}
.spread-body{display:flex;flex-direction:column;gap:0;padding:6px 22px 0;}
@media(min-width:640px){.spread-body{flex-direction:row;gap:26px;padding:6px 28px 0;}}
.photo-stage{flex:0 0 auto;width:100%;max-width:280px;margin:8px auto 0;perspective:1200px;}
@media(min-width:640px){.photo-stage{margin:8px 0 0;}}
.flip-card{position:relative;width:100%;aspect-ratio:2.5/3.5;cursor:pointer;}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .55s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d;}
.flip-card.flipped .flip-inner{transform:rotateY(180deg);}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:6px;overflow:hidden;background:linear-gradient(135deg,#efe5cf,#e2d3ae);border:6px solid #fff;box-shadow:0 8px 20px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;}
.flip-face img{width:100%;height:100%;object-fit:cover;}
.flip-face.back{transform:rotateY(180deg);}
.tape-corner{position:absolute;width:34px;height:16px;background:var(--tape);opacity:.85;box-shadow:0 1px 2px rgba(0,0,0,.15);}
.tape-corner.tl{top:-8px;left:14px;transform:rotate(-8deg);}
.tape-corner.tr{top:-8px;right:14px;transform:rotate(7deg);}
.flip-hint{text-align:center;font-family:var(--font-mono);font-size:10.5px;color:var(--ink-soft);margin-top:10px;letter-spacing:.03em;text-transform:uppercase;}
.card-info{flex:1;padding:18px 0 8px;min-width:0;}
.owner-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:11px;padding:3px 10px;border-radius:999px;margin-bottom:8px;letter-spacing:.02em;}
.owner-badge.dad{background:rgba(85,37,131,.12);color:var(--purple);}
.owner-badge.son{background:rgba(224,169,27,.16);color:#8a6510;}
.card-name{font-family:var(--font-display);font-weight:700;font-size:clamp(22px,4vw,30px);line-height:1.08;margin:0 0 2px;}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 14px;}
.tag-chip{font-family:var(--font-mono);font-size:10.5px;padding:3px 9px;border-radius:5px;text-transform:uppercase;letter-spacing:.03em;}
.tag-chip.Legends{background:rgba(85,37,131,.12);color:var(--purple);}
.tag-chip.Prospects{background:rgba(168,85,46,.14);color:var(--rust);}
.tag-chip.Rising-Stars{background:rgba(224,169,27,.18);color:#8a6510;}
.tag-chip.Other{background:rgba(92,107,63,.14);color:var(--moss);}
.stat-block{border-top:1px solid var(--paper-deep);border-bottom:1px solid var(--paper-deep);padding:10px 0;margin-bottom:16px;}
.stat-row{display:flex;justify-content:space-between;gap:10px;font-family:var(--font-mono);font-size:12.5px;padding:3px 0;color:var(--ink);}
.stat-row .k{color:var(--ink-soft);flex-shrink:0;}
.stat-row .v{text-align:right;}
.stat-edit-input{border:none;border-bottom:1px dashed var(--paper-deep);background:transparent;font-family:var(--font-mono);font-size:12.5px;color:var(--ink);text-align:right;width:60%;padding:1px 2px;}
.stat-edit-input:focus{border-bottom:1px dashed var(--purple);}
.story-label{font-family:var(--font-hand);font-size:19px;color:var(--rust);margin:14px 0 2px;display:flex;align-items:center;gap:8px;}
.story-label.thesis{color:var(--purple);margin-top:0;}
.save-indicator{font-family:var(--font-mono);font-size:10px;color:var(--moss);opacity:0;transition:opacity .4s;}
.save-indicator.show{opacity:1;}
.canvas-input{width:100%;border:none;background:transparent;resize:none;overflow:hidden;font-family:var(--font-body);font-size:15px;line-height:1.55;color:var(--ink);padding:2px 2px 6px;border-bottom:1px dashed var(--paper-deep);}
.canvas-input::placeholder{color:var(--ink-soft);font-style:italic;opacity:.75;}
.canvas-input:focus{border-bottom:1px dashed var(--purple);}
.story-text{font-family:var(--font-body);font-size:15px;line-height:1.55;color:var(--ink);white-space:pre-wrap;}
.story-empty{font-family:var(--font-body);font-style:italic;color:var(--ink-soft);font-size:13.5px;}
.btn{font-family:var(--font-display);font-weight:600;font-size:13px;padding:7px 14px;border-radius:8px;border:none;}
.btn.primary{background:var(--purple);color:#fff;}
.btn.ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--paper-deep);}
.listing-box{margin-top:14px;padding:9px 11px;background:var(--paper);border-radius:8px;font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);line-height:1.5;word-break:break-word;}
.listing-box a{color:var(--purple);}
.ledger-box{margin-top:10px;padding:10px 12px;background:var(--paper);border-radius:8px;border:1px dashed var(--paper-deep);}
.ledger-box .stat-row{font-size:12px;}
.ledger-box .title{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);margin-bottom:4px;}
.footer-note{text-align:center;font-family:var(--font-hand);font-size:16px;color:var(--ink-soft);margin-top:26px;}
#toastBanner{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#2B2420;color:#F7EFDC;padding:10px 16px;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;z-index:999;max-width:88%;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.4);opacity:0;transition:opacity .3s;pointer-events:none;}
</style>
</head>

<script>
(function(){
"use strict";
const FIREBASE_URL = "https://card-album-47d9d-default-rtdb.firebaseio.com"; // e.g. https://passed-down-xxxxx-default-rtdb.firebaseio.com

/* ===================== storage helpers =====================
   shared=false (password-remembered flags): stays on this device only, via localStorage.
   shared=true (stories/thesis/photos/stat corrections): synced to everyone, via Firebase. */
async function storeGet(key, shared){
  if(!shared){
    try{ return localStorage.getItem(key); }catch(e){ return null; }
  }
  try{
    const res = await fetch(FIREBASE_URL + '/' + encodeURIComponent(key) + '.json');
    if(!res.ok) return null;
    const data = await res.json();
    return (data === null || data === undefined) ? null : data;
  }catch(e){ return null; }
}
async function storeSetWithRetry(key, value, shared, attempts){
  if(!shared){
    try{ localStorage.setItem(key, value); return true; }catch(e){ return false; }
  }
  attempts = attempts || 3;
  for(let i=0;i<attempts;i++){
    try{
      const res = await fetch(FIREBASE_URL + '/' + encodeURIComponent(key) + '.json', {
        method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(value)
      });
      if(res.ok) return true;
    }catch(e){}
    if(i < attempts-1) await new Promise(r=>setTimeout(r, 350*(i+1)));
  }
  return false;
}
function showBanner(msg){
  let el = document.getElementById('toastBanner');
  el.textContent = msg;
  requestAnimationFrame(()=>{ el.style.opacity = '1'; });
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.opacity = '0'; }, 5000);
}

function esc(s){ if(s===null||s===undefined) return ''; return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(name){ if(!name) return '?'; return name.split(/[\s&/]+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function slug(tag){ return tag.replace(/\s+/g,'-'); }
function hashAngle(id){
  let h = 0;
  for(let i=0;i<id.length;i++){ h = (h*31 + id.charCodeAt(i)) | 0; }
  return ((Math.abs(h) % 700)/100 - 3.5).toFixed(2);
}
function fileToCompressedDataUrl(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxW = 900;
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ===================== state ===================== */
const state = {
  cards: [], loaded: false, tab: "all", activeTags: new Set(), search: "",
  openId: null, flipped: false, editingStatsFor: null
};
let STORIES = {};
let THESES = {};
let PHOTOS = {};
let OVERRIDES = {};
const STAT_KEYS = ['set','year','variant','cardNumber','grade'];

const GATE_PASSWORD = "KobeDaGOAT";
const EDIT_PASSWORD = "ThieroDaGOAT";
async function init(){
  const unlocked = await storeGet('gate_unlocked', false);
  if(unlocked === 'yes'){ boot(); } else { renderGate(); }
}
function renderGate(msg){
  const app = document.getElementById('app');
  app.innerHTML = `
    <div style="max-width:340px;margin:70px auto;padding:26px 22px;background:var(--paper-light);border-radius:14px;box-shadow:0 6px 20px var(--shadow);text-align:center;">
      <div style="font-family:var(--font-display);font-weight:700;font-size:26px;">Passed Down</div>
      <div style="font-family:var(--font-hand);font-size:18px;color:var(--ink-soft);margin:2px 0 18px;">enter the password to open the album</div>
      <input type="password" id="gatePw" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--paper-deep);font-family:var(--font-mono);font-size:15px;margin-bottom:10px;box-sizing:border-box;" placeholder="password" autocomplete="off">
      ${msg ? `<div style="color:#8c3a2a;font-family:var(--font-mono);font-size:12px;margin-bottom:10px;">${esc(msg)}</div>` : ''}
      <button class="btn primary" id="gateSubmit" style="width:100%;">Unlock</button>
    </div>`;
  const submit = async ()=>{
    const val = document.getElementById('gatePw').value;
    if(val === GATE_PASSWORD){
      await storeSetWithRetry('gate_unlocked', 'yes', false);
      boot();
    } else {
      renderGate('Wrong password — try again.');
    }
  };
  document.getElementById('gateSubmit').addEventListener('click', submit);
  document.getElementById('gatePw').addEventListener('keydown', (e)=>{ if(e.key==='Enter') submit(); });
  document.getElementById('gatePw').focus();
}

async function boot(){
  render();
  const raw = document.getElementById('seed-data').textContent;
  let cards = JSON.parse(raw);
  const storiesRaw = await storeGet('stories', true);
  if(storiesRaw){ try{ STORIES = JSON.parse(storiesRaw); }catch(e){ STORIES = {}; } }
  const thesesRaw = await storeGet('theses', true);
  if(thesesRaw){ try{ THESES = JSON.parse(thesesRaw); }catch(e){ THESES = {}; } }
  const photosRaw = await storeGet('photos', true);
  if(photosRaw){ try{ PHOTOS = JSON.parse(photosRaw); }catch(e){ PHOTOS = {}; } }
  const overridesRaw = await storeGet('overrides', true);
  if(overridesRaw){ try{ OVERRIDES = JSON.parse(overridesRaw); }catch(e){ OVERRIDES = {}; } }
  cards.forEach(c=>{
    c.story = STORIES[c.id] || '';
    c.thesis = THESES[c.player] || '';
    const p = PHOTOS[c.id] || {};
    c.frontImage = p.front || c.frontImage || null;
    c.backImage = p.back || c.backImage || null;
    const ov = OVERRIDES[c.id];
    if(ov){ STAT_KEYS.forEach(k=>{ if(ov[k] !== undefined) c[k] = ov[k]; }); }
  });
  state.cards = cards;
  state.loaded = true;
  render();
}

/* ===================== derived ===================== */
const ALL_TAGS = ["Legends","Prospects","Rising Stars","Other"];
function ownerLabel(o){ return o === 'dad' ? "Gideon's Collection" : "Leo's Collection"; }
function filteredCards(){
  return state.cards.filter(c=>{
    if(state.tab !== 'all' && c.owner !== state.tab) return false;
    if(state.activeTags.size > 0 && !(c.tags||[]).some(t=>state.activeTags.has(t))) return false;
    if(state.search.trim()){
      const q = state.search.trim().toLowerCase();
      if(!c.player.toLowerCase().includes(q) && !(c.set||'').toLowerCase().includes(q)) return false;
    }
    return true;
  }).sort((a,b)=> (b.datePurchased||'').localeCompare(a.datePurchased||'') || a.player.localeCompare(b.player));
}

/* ===================== render pieces ===================== */
function pinCardHtml(c){
  const angle = hashAngle(c.id);
  const photo = c.frontImage ? `<img src="${c.frontImage}" alt="${esc(c.player)}">` : `<div class="placeholder-ph">${esc(initials(c.player))}</div>`;
  const lock = (c.owner === 'son') ? `<div class="pin-lock" title="Not for trade">🔒</div>` : '';
  const subLine = c.variant || c.set || '';
  return `<div class="pin-card" style="transform:rotate(${angle}deg)" data-open="${c.id}">
    <div class="pin-photo">${photo}<div class="pin-owner ${c.owner}"></div>${lock}</div>
    <div class="pin-caption">${esc(c.player)}</div>
    <div class="pin-sub">${esc(subLine)}</div>
  </div>`;
}
function renderCorkboard(){
  const list = filteredCards();
  const empty = list.length === 0 ? `<div class="empty-note">nothing matches — try clearing a filter</div>` : '';
  return `<div class="corkboard"><div class="grid">${empty}${list.map(pinCardHtml).join('')}</div></div>`;
}
function renderSpread(c){
  const frontPh = `<div class="placeholder-ph" data-addphoto="front" style="cursor:pointer;">${esc(initials(c.player))}<br><span style="font-family:var(--font-mono);font-size:10px;color:#a8967a;">tap to add front</span></div>`;
  const backPh = `<div class="placeholder-ph" data-addphoto="back" style="font-size:13px;color:#a8967a;cursor:pointer;">tap to add back photo</div>`;
  const frontFace = c.frontImage ? `${frontPh}<img src="${c.frontImage}" alt="front" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" onerror="this.remove()">` : frontPh;
  const backFace = c.backImage ? `${backPh}<img src="${c.backImage}" alt="back" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" onerror="this.remove()">` : backPh;
  const tags = (c.tags||[]).map(t=>`<span class="tag-chip ${slug(t)}">${esc(t)}</span>`).join('');
  const STAT_FIELDS = [['set','Brand'],['year','Year'],['variant','Parallel'],['cardNumber','Card #'],['grade','Grade']];
  let statBlock;
  if(state.editingStatsFor === c.id){
    statBlock = `<div class="stat-block" id="statEditBlock">
      ${STAT_FIELDS.map(([key,label])=>`
        <div class="stat-row"><span class="k">${label}</span>
          <input class="stat-edit-input" data-statfield="${key}" value="${esc(c[key]||'')}">
        </div>`).join('')}
      <div style="text-align:right;margin-top:4px;"><button class="btn ghost" data-stats-done="1" style="font-size:11px;padding:4px 10px;">done</button></div>
    </div>`;
  } else {
    const statRows = STAT_FIELDS.filter(([key])=>c[key]).map(([key,label])=>`<div class="stat-row"><span class="k">${label}</span><span class="v">${esc(c[key])}</span></div>`).join('');
    statBlock = `<div class="stat-block">
      ${statRows || '<div class="story-empty">No stats on file yet.</div>'}
      <div style="text-align:right;margin-top:4px;"><button class="btn ghost" data-editstats="${c.id}" style="font-size:11px;padding:4px 10px;">correct stats</button></div>
    </div>`;
  }
  const lock = (c.owner === 'son') ? ` <span title="Not for trade">🔒</span>` : '';

  const thesisSection = `
      <div class="story-label thesis">The ${esc(c.player)} thesis <span class="save-indicator" id="thesisSaved">saved</span></div>
      <textarea class="canvas-input" id="thesisInput" data-autogrow="1" placeholder="Your read on ${esc(c.player)} — why collect him, what you're betting on...">${esc(c.thesis)}</textarea>`;
  const storySection = `
      <div class="story-label">This card's story <span class="save-indicator" id="storySaved">saved</span></div>
      <textarea class="canvas-input" id="storyInput" data-autogrow="1" placeholder="How'd you get this one? Anything that makes it special?">${esc(c.story)}</textarea>`;

  const dateLine = c.datePurchased ? `<div class="story-empty" style="margin-top:8px;">Acquired ${esc(c.datePurchased)}</div>` : '';

  return `
  <div class="spread-top"><button class="icon-btn" data-close="1" title="Close">✕</button></div>
  <div class="spread-body">
    <div class="photo-stage">
      <div class="flip-card ${state.flipped ? 'flipped' : ''}" data-flip="1">
        <div class="flip-inner">
          <div class="flip-face front"><span class="tape-corner tl"></span><span class="tape-corner tr"></span>${frontFace}</div>
          <div class="flip-face back">${backFace}</div>
        </div>
      </div>
      <div class="flip-hint">tap card to flip · tap a blank side to add that photo</div>
      <input type="file" id="frontFileInput" accept="image/*" style="display:none">
      <input type="file" id="backFileInput" accept="image/*" style="display:none">
    </div>
    <div class="card-info">
      <div class="owner-badge ${c.owner}">${ownerLabel(c.owner)}${lock}</div>
      <h2 class="card-name">${esc(c.player)}</h2>
      <div class="card-tags">${tags}</div>
      ${statBlock}
      ${thesisSection}
      ${storySection}
      ${dateLine}
    </div>
  </div>`;
}

function render(){
  const app = document.getElementById('app');
  if(!state.loaded){
    app.innerHTML = `<div class="empty-note" style="color:var(--ink-soft);padding:60px 0;">opening the album…</div>`;
    if(!document.getElementById('toastBanner')){ const t=document.createElement('div'); t.id='toastBanner'; document.body.appendChild(t); }
    return;
  }
  const tagPills = ALL_TAGS.map(t=>`<button class="pill ${state.activeTags.has(t)?'active':''}" data-tag="${esc(t)}">${esc(t)}</button>`).join('');
  const withPhoto = state.cards.filter(c=>c.frontImage).length;

  app.innerHTML = `
    <div class="header">
      <div class="title-block"><h1>Passed Down</h1><div class="sub">a card album, kept by two collectors</div></div>
    </div>
    <div class="tabs">
      <button class="tab ${state.tab==='all'?'active':''}" data-tab="all">All Cards</button>
      <button class="tab ${state.tab==='dad'?'active':''}" data-tab="dad"><span class="dot"></span>Gideon's Collection</button>
      <button class="tab ${state.tab==='son'?'active':''}" data-tab="son"><span class="dot"></span>Leo's Collection</button>
    </div>
    <div class="filters">
      ${tagPills}
      <div class="search-wrap"><input type="text" id="searchInput" placeholder="search a player or set…" value="${esc(state.search)}"></div>
    </div>
    ${renderCorkboard()}
    <div class="footer-note">${state.cards.length} cards · ${withPhoto} with photos so far</div>
    <div class="overlay ${state.openId ? 'show':''}" id="overlay">
      ${state.openId ? '<button class="close-fab" data-close="1">✕</button>' : ''}
      <div class="spread">${state.openId ? renderSpread(state.cards.find(c=>c.id===state.openId) || {}) : ''}</div>
    </div>
  `;
  if(!document.getElementById('toastBanner')){ const t=document.createElement('div'); t.id='toastBanner'; document.body.appendChild(t); }
  bindEvents();
}

function renderBoardOnly(){
  const board = document.querySelector('.corkboard');
  if(board){ board.outerHTML = renderCorkboard(); rebindBoardEvents(); }
}
function rebindBoardEvents(){
  document.querySelectorAll('[data-open]').forEach(el=>el.addEventListener('click', ()=>{
    state.openId = el.getAttribute('data-open'); state.flipped = false; state.editingStatsFor = null; render();
  }));
}

function bindEvents(){
  const app = document.getElementById('app');
  app.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click', ()=>{ state.tab = el.getAttribute('data-tab'); render(); }));
  app.querySelectorAll('[data-tag]').forEach(el=>el.addEventListener('click', ()=>{
    const t = el.getAttribute('data-tag');
    if(state.activeTags.has(t)) state.activeTags.delete(t); else state.activeTags.add(t);
    render();
  }));
  const search = document.getElementById('searchInput');
  if(search) search.addEventListener('input', ()=>{ state.search = search.value; renderBoardOnly(); });

  app.querySelectorAll('[data-open]').forEach(el=>el.addEventListener('click', ()=>{
    state.openId = el.getAttribute('data-open'); state.flipped = false; state.editingStatsFor = null; render();
  }));
  app.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click', ()=>{ state.openId=null; state.editingStatsFor=null; render(); }));
  const overlay = document.getElementById('overlay');
  if(overlay) overlay.addEventListener('click', (e)=>{ if(e.target===overlay){ state.openId=null; state.editingStatsFor=null; render(); }});

  const flipEl = app.querySelector('[data-flip]');
  if(flipEl) flipEl.addEventListener('click', (e)=>{
    if(e.target.closest('[data-addphoto]')) return;
    state.flipped = !state.flipped; render();
  });

  app.querySelectorAll('[data-addphoto]').forEach(el=>el.addEventListener('click', (e)=>{
    e.stopPropagation();
    const which = el.getAttribute('data-addphoto');
    const input = document.getElementById(which === 'front' ? 'frontFileInput' : 'backFileInput');
    if(input) input.click();
  }));
  ['frontFileInput','backFileInput'].forEach(id=>{
    const input = document.getElementById(id);
    if(!input) return;
    input.addEventListener('change', async ()=>{
      if(!input.files[0]) return;
      const which = id === 'frontFileInput' ? 'front' : 'back';
      const dataUrl = await fileToCompressedDataUrl(input.files[0]);
      PHOTOS[state.openId] = PHOTOS[state.openId] || {};
      PHOTOS[state.openId][which] = dataUrl;
      const c = state.cards.find(c=>c.id===state.openId);
      if(c){ if(which==='front') c.frontImage = dataUrl; else c.backImage = dataUrl; }
      render();
      const ok = await storeSetWithRetry('photos', JSON.stringify(PHOTOS), true);
      if(!ok) showBanner("Photo saved on this device, but had trouble syncing — try again in a moment.");
    });
  });

  // canvas-style inline editors: autosize + debounced autosave, no dialogs
  function wireCanvasInput(id, indicatorId, getKeyAndSave){
    const ta = document.getElementById(id);
    if(!ta) return;
    const autosize = ()=>{ ta.style.height = 'auto'; ta.style.height = (ta.scrollHeight + 2) + 'px'; };
    autosize();
    let timer = null;
    const flush = async ()=>{
      const ok = await getKeyAndSave(ta.value);
      const ind = document.getElementById(indicatorId);
      if(ind){
        if(ok){ ind.classList.add('show'); clearTimeout(ind._t); ind._t = setTimeout(()=>ind.classList.remove('show'), 1200); }
        else showBanner("Couldn't sync — try again in a moment.");
      }
    };
    ta.addEventListener('input', ()=>{
      autosize();
      clearTimeout(timer);
      timer = setTimeout(flush, 900);
    });
    ta.addEventListener('blur', ()=>{ clearTimeout(timer); flush(); });
  }
  wireCanvasInput('thesisInput', 'thesisSaved', async (val)=>{
    const c = state.cards.find(c=>c.id===state.openId);
    if(!c) return false;
    THESES[c.player] = val;
    state.cards.forEach(cc=>{ if(cc.player === c.player) cc.thesis = val; });
    return await storeSetWithRetry('theses', JSON.stringify(THESES), true);
  });
  wireCanvasInput('storyInput', 'storySaved', async (val)=>{
    if(!state.openId) return false;
    STORIES[state.openId] = val;
    const c = state.cards.find(c=>c.id===state.openId);
    if(c) c.story = val;
    return await storeSetWithRetry('stories', JSON.stringify(STORIES), true);
  });

  // correct-stats: password-gated, remembered per device, autosaves like the canvas fields
  const editStatsBtn = app.querySelector('[data-editstats]');
  if(editStatsBtn) editStatsBtn.addEventListener('click', async ()=>{
    const cardId = editStatsBtn.getAttribute('data-editstats');
    const already = await storeGet('edit_unlocked', false);
    if(already === 'yes'){
      state.editingStatsFor = cardId; render(); return;
    }
    const pw = prompt("Enter the stats-editing password:");
    if(pw === EDIT_PASSWORD){
      await storeSetWithRetry('edit_unlocked', 'yes', false);
      state.editingStatsFor = cardId; render();
    } else if(pw !== null){
      showBanner("Wrong password.");
    }
  });
  const statsDoneBtn = app.querySelector('[data-stats-done]');
  if(statsDoneBtn) statsDoneBtn.addEventListener('click', ()=>{ state.editingStatsFor = null; render(); });

  app.querySelectorAll('.stat-edit-input').forEach(input=>{
    let timer = null;
    const flush = async ()=>{
      const c = state.cards.find(c=>c.id===state.openId);
      if(!c) return;
      OVERRIDES[c.id] = OVERRIDES[c.id] || {};
      app.querySelectorAll('.stat-edit-input').forEach(inp=>{
        const key = inp.getAttribute('data-statfield');
        OVERRIDES[c.id][key] = inp.value;
        c[key] = inp.value;
      });
      const ok = await storeSetWithRetry('overrides', JSON.stringify(OVERRIDES), true);
      if(!ok) showBanner("Couldn't sync the correction — try again in a moment.");
    };
    input.addEventListener('input', ()=>{ clearTimeout(timer); timer = setTimeout(flush, 900); });
    input.addEventListener('blur', ()=>{ clearTimeout(timer); flush(); });
  });
}

init();
})();
</script>
</body>
</html>
